databases:
  # 1. The PostgreSQL Database
  - name: cohabit-db
    plan: free
    region: singapore # You can change this based on your location

services:

  # 2. The FastAPI Backend
  - type: web
    name: cohabit-api
    env: python
    region: singapore
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt && mkdir -p static && cp -r ../frontend/dist/* static/"
    startCommand: "cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cohabit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render will automatically create a secure random string
      - key: GEMINI_API_KEY
        sync: false # You MUST add this manually in the Render Dashboard
