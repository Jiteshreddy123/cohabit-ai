databases:
  # 1. The PostgreSQL Database
  - name: cohabit-db
    plan: free
    region: singapore # You can change this based on your location

services:

  # 2. The Unified Docker Service
  - type: web
    name: cohabit-api
    env: docker
    region: singapore
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cohabit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render will automatically create a secure random string
      - key: GEMINI_API_KEY
        sync: false # You MUST add this manually in the Render Dashboard
